<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Striver A2Z — DSA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080b10;--bg2:#0d1117;--border:#1a2436;--border2:#243044;--txt:#cdd9e5;--txt2:#768a9e;--txt3:#3d5166;--accent:#39d353;--mono:'JetBrains Mono',monospace;--display:'Syne',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;line-height:1.5;min-height:100vh}
  #header{position:sticky;top:0;z-index:200;background:rgba(8,11,16,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:16px 20px 14px}
  .header-inner{max-width:860px;margin:0 auto}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .brand-tag{font-size:10px;color:var(--accent);letter-spacing:4px;text-transform:uppercase;margin-bottom:3px}
  .brand-title{font-family:var(--display);font-size:20px;font-weight:800;color:#eaf2f8;letter-spacing:-.5px}
  .global-pct{font-family:var(--display);font-size:30px;font-weight:800;color:var(--accent);line-height:1;text-align:right}
  .global-sub{font-size:10px;color:var(--txt3);margin-top:2px;text-align:right;letter-spacing:1px}
  .gbar-wrap{margin-top:12px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
  .gbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#58a6ff);border-radius:99px;transition:width .5s}
  .filter-row{display:flex;align-items:center;gap:6px;margin-top:12px}
  .filter-btn{padding:3px 11px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--txt3);font-size:10px;font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s}
  .filter-btn:hover{border-color:var(--txt3);color:var(--txt2)}
  .filter-btn.active{border-color:var(--accent);background:rgba(57,211,83,.08);color:var(--accent)}
  .save-dot{margin-left:auto;font-size:10px;color:var(--txt3);letter-spacing:1px;transition:color .3s}
  .save-dot.live{color:var(--accent)}
  main{max-width:860px;margin:0 auto;padding:16px 16px 60px}
  .phase{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
  .phase.open{border-color:color-mix(in srgb,var(--phase-color) 40%,transparent)}
  .phase-hdr{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .15s}
  .phase-hdr:hover{background:rgba(255,255,255,.02)}
  .phase.open .phase-hdr{background:color-mix(in srgb,var(--phase-color) 6%,transparent)}
  .phase-emoji{font-size:18px;line-height:1;flex-shrink:0}
  .phase-info{flex:1;min-width:0}
  .phase-name{font-family:var(--display);font-size:13px;font-weight:700;color:#eaf2f8;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .bonus-badge{font-size:9px;font-family:var(--mono);padding:1px 7px;border-radius:99px;background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3);letter-spacing:1px}
  .phase-meta{font-size:11px;color:var(--txt3);margin-top:2px}
  .phase-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .phase-bar-wrap{width:72px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
  .phase-bar-fill{height:100%;background:var(--phase-color);border-radius:99px;transition:width .3s}
  .phase-pct{font-size:11px;color:var(--phase-color);width:32px;text-align:right}
  .phase-chev{font-size:11px;color:var(--txt3);transition:transform .2s}
  .phase.open .phase-chev{transform:rotate(180deg)}
  .sections{display:none}
  .phase.open .sections{display:block}
  .section{border-top:1px solid var(--border)}
  .sec-hdr{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 42px;cursor:pointer;user-select:none;transition:background .15s}
  .sec-hdr:hover{background:rgba(255,255,255,.015)}
  .sec-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .15s}
  .sec-check.done{border-color:var(--phase-color);background:color-mix(in srgb,var(--phase-color) 20%,transparent);color:var(--phase-color)}
  .sec-info{flex:1;min-width:0}
  .sec-day{font-size:11px;color:var(--txt2)}
  .sec-label{font-size:11px;color:var(--txt3);margin-left:6px}
  .sec-count{font-size:11px;color:var(--txt3);flex-shrink:0}
  .sec-chev{font-size:10px;color:var(--txt3);transition:transform .2s}
  .sec-hdr.open .sec-chev{transform:rotate(180deg)}
  .tasks{display:none;padding:4px 16px 10px 42px}
  .tasks.open{display:block}
  .task{display:flex;align-items:flex-start;gap:9px;padding:5px 8px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:background .12s}
  .task:hover{background:rgba(255,255,255,.03)}
  .task.done{background:color-mix(in srgb,var(--phase-color) 5%,transparent)}
  .task-box{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:8px;font-weight:900;transition:all .12s}
  .task.done .task-box{border-color:var(--phase-color);background:var(--phase-color);color:#080b10}
  .task-body{flex:1;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .task-txt{font-size:12px;color:var(--txt2);line-height:1.55;transition:all .12s}
  .task.done .task-txt{color:var(--txt3);text-decoration:line-through;text-decoration-color:var(--txt3)}
  .task-links{display:flex;gap:4px;flex-shrink:0;margin-top:1px}
  .lc-badge,.gfg-badge{font-size:9px;padding:1px 7px;border-radius:3px;text-decoration:none;font-family:var(--mono);letter-spacing:.5px;white-space:nowrap;transition:opacity .15s;opacity:.75}
  .lc-badge{background:rgba(255,161,22,.12);color:#ffa116;border:1px solid rgba(255,161,22,.25)}
  .gfg-badge{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
  .lc-badge:hover,.gfg-badge:hover{opacity:1}
  .task.done .task-links{opacity:.4}
  .empty-msg{padding:10px 0 8px;font-size:11px;color:var(--txt3);font-style:italic}
  footer{text-align:center;padding:20px 0 0;font-size:10px;color:var(--border2);letter-spacing:2px}
</style>
</head>

const KEY="dsa_v5";
let checked={},filter="all",saveTimer=null;
try{const s=localStorage.getItem(KEY);if(s)checked=JSON.parse(s);}catch{}

function save(){
  try{localStorage.setItem(KEY,JSON.stringify(checked));}catch{}
  const d=document.getElementById("saveDot");
  d.textContent="● saving...";d.classList.add("live");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{d.textContent="● saved";d.classList.remove("live");},700);
}

function tk(p,s,i){return p+"-"+s+"-"+i}

function updateGlobal(){
  let t=0,d=0;
  PHASES.forEach(p=>p.sections.forEach(s=>s.tasks.forEach((_,i)=>{t++;if(checked[tk(p.id,s.id,i)])d++;})));
  const pct=t?Math.round(d/t*100):0;
  document.getElementById("gPct").textContent=pct+"%";
  document.getElementById("gSub").textContent=d+" / "+t+" tasks";
  document.getElementById("gBar").style.width=pct+"%";
}

function updatePhaseBar(pid){
  const ph=PHASES.find(p=>p.id===pid);
  let t=0,d=0;
  ph.sections.forEach(s=>s.tasks.forEach((_,i)=>{t++;if(checked[tk(pid,s.id,i)])d++;}));
  const pct=t?Math.round(d/t*100):0;
  const f=document.querySelector('[data-phase="'+pid+'"] .phase-bar-fill');
  const pe=document.querySelector('[data-phase="'+pid+'"] .phase-pct');
  const m=document.querySelector('[data-phase="'+pid+'"] .phase-meta');
  if(f)f.style.width=pct+"%";
  if(pe)pe.textContent=pct+"%";
  if(m)m.textContent=ph.days+" · "+d+"/"+t+" tasks";
}

function updateSecCheck(pid,sid){
  const ph=PHASES.find(p=>p.id===pid);
  const sec=ph.sections.find(s=>s.id===sid);
  const done=sec.tasks.every((_,i)=>checked[tk(pid,sid,i)]);
  const el=document.querySelector('[data-sec="'+pid+"-"+sid+'"] .sec-check');
  if(el){el.classList.toggle("done",done);el.textContent=done?"✓":"";}
  const cnt=document.querySelector('[data-sec="'+pid+"-"+sid+'"] .sec-count');
  if(cnt){const d=sec.tasks.filter((_,i)=>checked[tk(pid,sid,i)]).length;cnt.textContent=d+"/"+sec.tasks.length;}
}

function badge(links){
  if(!links||!links.length)return"";
  return'<span class="task-links" onclick="event.stopPropagation()">'+links.map(l=>'<a class="'+(l.t===LC?"lc-badge":"gfg-badge")+'" href="'+l.u+'" target="_blank" rel="noopener">'+(l.t===LC?"LC":"GFG")+'</a>').join("")+'</span>';
}

function renderTasks(pid,sid,container){
  const ph=PHASES.find(p=>p.id===pid);
  const sec=ph.sections.find(s=>s.id===sid);
  container.innerHTML="";
  const vis=sec.tasks.map((task,i)=>{
    const k=tk(pid,sid,i),isDone=!!checked[k];
    if(filter==="done"&&!isDone)return null;
    if(filter==="pending"&&isDone)return null;
    return{task,i,isDone,k};
  }).filter(Boolean);
  if(!vis.length){
    const em=document.createElement("div");em.className="empty-msg";
    em.textContent=filter==="done"?"No completed tasks yet.":"All done in this section! 🎉";
    container.appendChild(em);return;
  }
  vis.forEach(({task,i,isDone,k})=>{
    const row=document.createElement("div");
    row.className="task"+(isDone?" done":"");
    row.innerHTML='<div class="task-box">'+(isDone?"✓":"")+'</div><div class="task-body"><span class="task-txt">'+task.t+'</span>'+badge(task.links)+'</div>';
    row.addEventListener("click",()=>{
      checked[k]=!checked[k];save();
      updateGlobal();updatePhaseBar(pid);updateSecCheck(pid,sid);
      renderTasks(pid,sid,container);
    });
    container.appendChild(row);
  });
}

function buildUI(){
  const main=document.getElementById("main");main.innerHTML="";
  PHASES.forEach((phase)=>{
    const card=document.createElement("div");
    card.className="phase";card.dataset.phase=phase.id;
    card.style.setProperty("--phase-color",phase.color);
    let t=0,d=0;
    phase.sections.forEach(s=>s.tasks.forEach((_,i)=>{t++;if(checked[tk(phase.id,s.id,i)])d++;}));
    const pct=t?Math.round(d/t*100):0;
    const hdr=document.createElement("div");hdr.className="phase-hdr";
    hdr.innerHTML='<div class="phase-emoji">'+phase.e+'</div><div class="phase-info"><div class="phase-name">'+phase.title+(phase.bonus?'<span class="bonus-badge">BONUS</span>':'')+'</div><div class="phase-meta">'+phase.days+' · '+d+'/'+t+' tasks</div></div><div class="phase-right"><div class="phase-bar-wrap"><div class="phase-bar-fill" style="width:'+pct+'%"></div></div><div class="phase-pct">'+pct+'%</div><div class="phase-chev">▾</div></div>';
    card.appendChild(hdr);
    const secs=document.createElement("div");secs.className="sections";
    phase.sections.forEach((sec)=>{
      const allDone=sec.tasks.every((_,i)=>checked[tk(phase.id,sec.id,i)]);
      const sDone=sec.tasks.filter((_,i)=>checked[tk(phase.id,sec.id,i)]).length;
      const secDiv=document.createElement("div");secDiv.className="section";secDiv.dataset.sec=phase.id+"-"+sec.id;
      const secHdr=document.createElement("div");secHdr.className="sec-hdr";
      secHdr.innerHTML='<div class="sec-check '+(allDone?"done":"")+'">'+( allDone?"✓":"")+'</div><div class="sec-info"><span class="sec-day">'+sec.day+'</span><span class="sec-label">'+sec.label+'</span></div><span class="sec-count">'+sDone+'/'+sec.tasks.length+'</span><span class="sec-chev">▾</span>';
      const taskDiv=document.createElement("div");taskDiv.className="tasks";
      secHdr.addEventListener("click",()=>{
        const open=secHdr.classList.toggle("open");
        taskDiv.classList.toggle("open",open);
        if(open)renderTasks(phase.id,sec.id,taskDiv);
      });
      secDiv.appendChild(secHdr);secDiv.appendChild(taskDiv);secs.appendChild(secDiv);
    });
    hdr.addEventListener("click",()=>{
      const open=card.classList.toggle("open");
      if(open){
        const fsh=secs.querySelector(".sec-hdr"),ftd=secs.querySelector(".tasks");
        if(fsh&&!fsh.classList.contains("open")){fsh.classList.add("open");ftd.classList.add("open");renderTasks(phase.id,phase.sections[0].id,ftd);}
      }
    });
    card.appendChild(secs);main.appendChild(card);
  });
  const total=PHASES.flatMap(p=>p.sections.flatMap(s=>s.tasks)).length;
  main.insertAdjacentHTML("beforeend","<footer>STRIVER A2Z DSA · "+total+" TASKS · LC = LEETCODE · GFG = GEEKSFORGEEKS · SAVED TO BROWSER</footer>");
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    filter=btn.dataset.f;
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tasks.open").forEach(td=>{
      const key=td.closest(".section").dataset.sec;
      const m=key.match(/^(p\d+)-(s\d+)$/);
      if(m)renderTasks(m[1],m[2],td);
    });
  });
});
buildUI();updateGlobal();
</script>
</body>
</html>
